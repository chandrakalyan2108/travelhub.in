<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Flights')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="hero" style="padding-bottom:60px;">
    <div class="container">
        <h1>Book domestic flights</h1>
        <p>Compare airlines and fares in seconds</p>
    </div>
</section>

<div class="container">
    <div class="search-panel">
        <h3>Search flights</h3>
        <form class="search-form" method="get" th:action="@{/flights}">
            <div class="field"><label>From</label><input type="text" name="source" placeholder="Hyderabad" th:value="${source}"/></div>
            <div class="field"><label>To</label><input type="text" name="destination" placeholder="Mumbai" th:value="${destination}"/></div>
            <div class="field"><label>Date</label><input type="date" name="date" th:value="${date}"/></div>
            <button class="btn" type="submit">Search</button>
        </form>
    </div>
</div>

<div class="container section">
    <h2 class="section-title">✈️ Available Flights</h2>

    <div th:if="${#lists.isEmpty(flights)}" class="empty-state">No flights found for that route. Try another search.</div>

    <div th:each="f : ${flights}" class="panel" style="margin-bottom:16px;">
        <div class="route-row">
            <div style="min-width:120px;">
                <div class="card-title" th:text="${f.airline}">Airline</div>
                <div class="card-sub" th:text="${f.flightNumber}">FL-001</div>
            </div>
            <div class="route-point"><div class="time" th:text="${f.departureTime}">10:00</div><div class="place" th:text="${f.source}">Source</div></div>
            <div class="route-line"></div>
            <div class="route-point"><div class="time" th:text="${f.arrivalTime}">12:00</div><div class="place" th:text="${f.destination}">Destination</div></div>
            <div style="text-align:right; min-width:130px;">
                <div class="price">₹<span th:text="${#numbers.formatDecimal(f.price,0,0)}">0</span></div>
                <div class="card-sub" th:text="${f.seatsAvailable} + ' seats left'">seats</div>
            </div>
        </div>

        <details style="margin-top:12px;">
            <summary class="btn secondary" style="display:inline-block;">Book this flight</summary>
            <form method="post" th:action="@{/booking/create}" style="margin-top:14px;">
                <input type="hidden" name="type" value="FLIGHT"/>
                <input type="hidden" name="itemId" th:value="${f.id}"/>
                <input type="hidden" name="itemName" th:value="${f.airline} + ' ' + ${f.flightNumber}"/>
                <input type="hidden" name="itemDetails" th:value="${f.source} + ' → ' + ${f.destination} + ' (' + ${f.departureTime} + ' - ' + ${f.arrivalTime} + ')'"/>
                <input type="hidden" name="amount" th:value="${f.price}"/>
                <div class="form-grid">
                    <div><label>Travel date</label><input type="date" name="travelDate" required/></div>
                    <div><label>Passengers</label><input type="number" name="quantity" min="1" value="1" required/></div>
                    <div><label>Passenger name</label><input type="text" name="customerName" required/></div>
                    <div><label>Email</label><input type="email" name="customerEmail" required/></div>
                    <div><label>Phone</label><input type="tel" name="customerPhone"/></div>
                </div>
                <button type="submit" class="btn block" style="margin-top:14px;">Continue to Payment</button>
            </form>
        </details>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
