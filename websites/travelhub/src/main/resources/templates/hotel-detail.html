<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${hotel.name})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container section">
    <div class="detail-wrap">
        <div>
            <img class="detail-img" th:src="${hotel.imageUrl}" th:alt="${hotel.name}"/>
            <div class="panel" style="margin-top:18px;">
                <h3 th:text="${hotel.name}">Hotel Name</h3>
                <p class="card-sub" th:text="${hotel.address} + ', ' + ${hotel.city}">Address, City</p>
                <span class="badge" th:text="${hotel.amenities}">Amenities</span>
                <p style="margin-top:14px;">Rating: <span class="rating">★ <span th:text="${hotel.rating}">4.5</span></span></p>
            </div>
        </div>

        <div class="panel">
            <h3>Book this hotel</h3>
            <p class="price">₹<span th:text="${#numbers.formatDecimal(hotel.pricePerNight,0,0)}">0</span> <small style="font-size:13px;color:var(--muted);">/ night</small></p>
            <form method="post" th:action="@{/booking/create}">
                <input type="hidden" name="type" value="HOTEL"/>
                <input type="hidden" name="itemId" th:value="${hotel.id}"/>
                <input type="hidden" name="itemName" th:value="${hotel.name}"/>
                <input type="hidden" name="itemDetails" th:value="${hotel.city} + ' · ' + ${hotel.address}"/>
                <input type="hidden" name="amount" th:value="${hotel.pricePerNight}"/>

                <div class="form-grid">
                    <div class="full">
                        <label>Check-in date</label>
                        <input type="date" name="travelDate" required/>
                    </div>
                    <div>
                        <label>Nights (rooms x nights)</label>
                        <input type="number" name="quantity" min="1" value="1" required/>
                    </div>
                    <div>
                        <label>Guest name</label>
                        <input type="text" name="customerName" required/>
                    </div>
                    <div>
                        <label>Email</label>
                        <input type="email" name="customerEmail" required/>
                    </div>
                    <div>
                        <label>Phone</label>
                        <input type="tel" name="customerPhone"/>
                    </div>
                </div>
                <button type="submit" class="btn block" style="margin-top:16px;">Continue to Payment</button>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
